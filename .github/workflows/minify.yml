name: Minify HTML
on:
  push:
    branches: [main]
jobs:
  minify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Minify HTML files
        run: |
          sudo apt-get install -y minify
          for f in *.html; do minify --type html "$f" -o "$f"; done
      - name: Commit minified files
        run: |
          git config user.email "webmaster.partecipazione.attiva@gmail.com"
          git config user.name "Partecipazione Attiva"
          git add *.html
          git diff --staged --quiet || git commit -m "Minifica HTML automaticamente"
          git push
